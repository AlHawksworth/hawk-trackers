<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>KnowYourTeam</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="top-bar">
      <div class="top-bar-left">
        <a href="../index.html" class="home-btn" title="Back to Dashboard">🏠</a>
        <span class="app-logo">⚽</span>
        <span class="app-title">KnowYourTeam</span>
      </div>
      <div class="top-bar-right">
        <button class="filter-btn" id="filter-btn">
          <span class="filter-icon">🏆</span>
          <span class="filter-label" id="filter-label">All Leagues</span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Search / Browse View -->
      <section id="view-browse" class="view active">
        <div class="search-wrap">
          <input type="text" id="search-input" class="search-input" placeholder="Search for a team..." autocomplete="off" />
        </div>
        <div id="league-filter" class="league-filter hidden">
          <button class="league-chip active" data-league="all">All</button>
          <button class="league-chip" data-league="Premier League">Premier League</button>
          <button class="league-chip" data-league="Championship">Championship</button>
          <button class="league-chip" data-league="League One">League One</button>
          <button class="league-chip" data-league="League Two">League Two</button>
          <button class="league-chip" data-league="National League">National League</button>
        </div>
        <div id="team-list" class="team-list"></div>
      </section>

      <!-- Team Detail View -->
      <section id="view-team" class="view">
        <button class="back-btn" id="back-btn">← Back</button>
        <div id="team-detail"></div>
      </section>
    </main>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-sync.js"></script>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
