<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>SQL Mimo</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="learn">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Learn</span>
      </button>
      <button class="nav-btn" data-view="practice">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Practice</span>
      </button>
      <button class="nav-btn" data-view="badges">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Badges</span>
      </button>
      <button class="nav-btn" data-view="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>

    <!-- Header bar -->
    <header id="top-bar">
      <div class="top-bar-left">
        <span class="app-logo">🗄️</span>
        <span class="app-title">SQL Mimo</span>
      </div>
      <div class="top-bar-right">
        <div class="streak-badge" id="streak-badge">
          <span class="streak-icon">🔥</span>
          <span class="streak-count" id="streak-count">0</span>
        </div>
        <div class="xp-badge" id="xp-badge">
          <span class="xp-count" id="xp-count">0</span>
          <span class="xp-label">XP</span>
        </div>
      </div>
    </header>

    <!-- Views -->
    <main id="main-content">
      <!-- Learn View -->
      <section id="view-learn" class="view active">
        <div class="view-header">
          <h1>SQL Journey</h1>
          <p class="view-subtitle">Master SQL one lesson at a time</p>
        </div>
        <div id="lesson-path" class="lesson-path"></div>
      </section>

      <!-- Practice View -->
      <section id="view-practice" class="view">
        <div class="view-header">
          <h1>Practice Mode</h1>
          <p class="view-subtitle">Sharpen your skills with random challenges</p>
        </div>
        <div id="practice-area"></div>
      </section>

      <!-- Badges View -->
      <section id="view-badges" class="view">
        <div class="view-header">
          <h1>Badges</h1>
          <p class="view-subtitle">Collect them all</p>
        </div>
        <div id="badges-grid" class="badges-grid"></div>
      </section>

      <!-- Profile View -->
      <section id="view-profile" class="view">
        <div class="view-header">
          <h1>Profile</h1>
          <p class="view-subtitle">Your SQL learning stats</p>
        </div>
        <div id="profile-content"></div>
      </section>
    </main>

    <!-- Lesson Modal -->
    <div id="lesson-modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="modal-close">✕</button>
        <div class="lesson-progress-bar">
          <div class="lesson-progress-fill" id="lesson-progress-fill"></div>
        </div>
        <div id="lesson-body"></div>
      </div>
    </div>

    <!-- Badge Unlock Toast -->
    <div id="badge-toast" class="badge-toast hidden">
      <div class="badge-toast-inner">
        <span class="badge-toast-icon" id="badge-toast-icon"></span>
        <div class="badge-toast-text">
          <strong id="badge-toast-title"></strong>
          <span id="badge-toast-desc"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../firebase-sync.js"></script>

  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="badges.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
